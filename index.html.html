<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 KFSHRC-J Planetree Certification Journey</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --kg:#00573F;--kg2:#006B4E;--kd:#002B20;
  --gold:#C4922A;--gold2:#D4A843;
  --surface:#F2F7F4;--text:#111827;--muted:#6B7280;
  --border:#D1E5DA;--radius:11px;
  --shadow:0 2px 14px rgba(0,50,35,0.08);--shadow-lg:0 8px 32px rgba(0,50,35,0.14);
}
body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#9DC8B5;border-radius:4px}
input,select,button,textarea{font-family:'Inter',sans-serif}
#topbar{height:60px;background:linear-gradient(135deg,var(--kd) 0%,var(--kg) 60%,var(--kg2) 100%);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;box-shadow:0 3px 16px rgba(0,0,0,0.3);z-index:40;position:relative}
.topbar-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-badge{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 2px 8px rgba(196,146,42,0.4)}
.logo-text-main{color:#fff;font-weight:800;font-size:12px;white-space:nowrap}
.logo-text-sub{color:rgba(255,255,255,0.45);font-size:8.5px;letter-spacing:0.4px;text-transform:uppercase;white-space:nowrap}
.tb-div{width:1px;height:22px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
#tb-search{width:100%;padding:6px 12px 6px 28px;border-radius:17px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.08);color:#fff;font-size:11px;outline:none}
#tb-search::placeholder{color:rgba(255,255,255,0.35)}
.tb-search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);font-size:11px;pointer-events:none}
#search-drop{position:absolute;top:calc(100%+4px);left:0;right:0;background:#fff;border-radius:11px;box-shadow:var(--shadow-lg);z-index:200;max-height:290px;overflow-y:auto;display:none;border:1px solid var(--border)}
#search-drop.show{display:block}
.sd-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #F0F5F2}
.sd-item:hover{background:#F2F7F4}
.pred-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:17px;border:1px solid rgba(196,146,42,0.3);background:rgba(196,146,42,0.1);cursor:pointer;transition:all 0.15s}
.pred-pill:hover{background:rgba(196,146,42,0.2)}
.pred-label{font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
#pred-val{font-size:14px;font-weight:800}
.tb-stats{display:flex;gap:4px;flex-shrink:0}
.stat-chip{background:rgba(255,255,255,0.07);padding:3px 8px;border-radius:7px;text-align:center;border:1px solid rgba(255,255,255,0.1);min-width:40px}
.stat-chip-v{font-size:13px;font-weight:800;line-height:1}
.stat-chip-l{font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase}
.tb-btn{padding:5px 11px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s;font-weight:500}
.tb-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.tb-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;color:#fff;font-weight:600}
.user-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:13px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1)}
.role-mgr{font-size:10px;padding:2px 6px;border-radius:7px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3a2000}
.role-editor{font-size:10px;padding:2px 6px;border-radius:7px;font-weight:600;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}
.role-viewer{font-size:10px;padding:2px 6px;border-radius:7px;font-weight:600;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.45)}
#sidebar{width:250px;background:var(--kd);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(196,146,42,0.15)}
.sb-dtabs{padding:9px 8px 6px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-dtabs-lbl{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.8px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.sb-dtabs-row{display:flex;flex-wrap:wrap;gap:3px}
.d-btn{padding:4px 9px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:11px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.05);transition:all 0.15s}
.d-btn:hover:not(.active){color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.09)}
.sb-dinfo{padding:8px 11px 4px}
.sb-dnum{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;margin-bottom:2px}
.sb-dname{font-size:11px;color:rgba(255,255,255,0.55);line-height:1.3}
.sb-clist{flex:1;overflow-y:auto;padding:3px 5px 8px}
.cb{width:100%;text-align:left;padding:7px 8px;border-radius:8px;border:none;cursor:pointer;background:transparent;margin-bottom:1px;display:flex;align-items:flex-start;gap:6px;transition:background 0.12s}
.cb:hover:not(.active){background:rgba(255,255,255,0.05)}
.cb-id{font-size:9px;font-weight:700;font-family:monospace;flex-shrink:0;margin-top:1px}
.cb-info{flex:1;min-width:0}
.cb-name{font-size:10.5px;line-height:1.3;color:rgba(255,255,255,0.6)}
.cb.active .cb-name{color:#fff;font-weight:600}
.cb-meta{display:flex;align-items:center;gap:4px;margin-top:2px}
.cb-count{font-size:9px;color:rgba(255,255,255,0.28)}
.cb-warn{font-size:9px;color:#FCD34D}
.cb-prog{height:2px;border-radius:2px;background:rgba(255,255,255,0.07);margin-top:4px;overflow:hidden}
.cb-prog-fill{height:100%;border-radius:2px}
#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#filter-bar{padding:7px 13px;background:#fff;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,50,35,0.05)}
.fb-label{font-size:10px;font-weight:700;color:var(--kg);text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap}
.fb-sel{padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer;color:var(--text);outline:none}
.fb-input{padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:11px;color:var(--text);outline:none;min-width:140px}
.fb-spacer{flex:1}
.fb-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:13px;background:#E6F4EF;color:var(--kg2);border:1px solid #B3DECE;font-size:11px;font-weight:600}
.fb-clear{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer}
#main-content{flex:1;overflow-y:auto;padding:13px}
.ch{border-radius:var(--radius);padding:16px 20px;color:#fff;margin-bottom:12px}
.ch-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.ch-id{font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:4px}
.ch-name{font-family:'Playfair Display',serif;font-size:16px;line-height:1.25}
.ch-stats{display:flex;gap:6px;flex-wrap:wrap}
.ch-stat{background:rgba(255,255,255,0.15);padding:6px 11px;border-radius:8px;text-align:center;border:1px solid rgba(255,255,255,0.2);min-width:50px}
.ch-stat-v{font-size:16px;font-weight:800;line-height:1}
.ch-stat-l{font-size:9px;opacity:0.8;white-space:nowrap;margin-top:2px}
.issue-alert{margin-top:9px;padding:6px 11px;background:rgba(255,140,40,0.25);border-radius:7px;border:1px solid rgba(255,140,40,0.45);font-size:11px}
.tabs-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all 0.15s}
.tab-count{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;background:rgba(0,0,0,0.06)}
.tab-btn.active .tab-count{background:rgba(255,255,255,0.25)}
.me-card{background:#fff;border:1px solid var(--border);border-left:4px solid;border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,50,35,0.04);transition:box-shadow 0.15s}
.me-card:hover{box-shadow:var(--shadow)}
.me-card.issue{background:#FFFCF0}
.me-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.me-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.me-id{font-family:monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.me-desc{font-size:12.5px;color:#2A3525;line-height:1.65;margin:0}
.me-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.me-meta-item{font-size:11px;color:var(--muted)}
.warn-tag{font-size:10px;font-weight:600;color:#B84B00;background:#FEF0D8;padding:1px 7px;border-radius:8px}
.rating-row{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);flex-wrap:wrap}
.rating-lbl{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:0.3px}
.rating-sel{padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;outline:none;min-width:148px}
.comment-inp{flex:1;min-width:80px;padding:5px 9px;border-radius:8px;border:1px solid var(--border);font-size:11px;outline:none;color:var(--text)}
.saved-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;flex-shrink:0;opacity:0;transition:opacity 0.3s}
.saved-dot.show{opacity:1}
.who-changed{font-size:10px;color:var(--muted);background:#F2F7F4;padding:3px 7px;border-radius:6px;display:flex;align-items:center;gap:3px;white-space:nowrap;cursor:pointer}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:11px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:9px}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:10px;color:var(--kg)}
.panel ul{padding-left:16px}
.panel li{margin-bottom:7px;font-size:12.5px;line-height:1.65;color:#2A3525}
.doc-item{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-radius:8px;margin-bottom:6px;border:1px solid}
.doc-item.critical{background:#F0FAE8;border-color:#86C97A}
.doc-item.normal{background:#FAFCF8;border-color:#D1E5DA}
.doc-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.doc-text{font-size:12.5px;color:#222;line-height:1.5}
.doc-crit-tag{font-size:10px;font-weight:700;color:#2E7D32;display:block;margin-top:2px;text-transform:uppercase}
.modal-ov{position:fixed;inset:0;background:rgba(0,20,15,0.78);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:540px;box-shadow:var(--shadow-lg);position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:12px;background:#F3F4F6;border:none;width:27px;height:27px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--kd);margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.form-lbl{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.btn{padding:7px 16px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-primary{background:linear-gradient(135deg,var(--kg),var(--kg2));color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:#F3F4F6;color:var(--text)}
.btn-danger{background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA}
.user-card{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;background:#FAFCF8}
.user-avatar{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.user-card-info{flex:1;min-width:0}
.user-card-name{font-weight:600;font-size:12.5px}
.user-card-id{font-size:11px;color:var(--muted)}
.user-card-actions{display:flex;gap:5px}
.audit-item{padding:9px 11px;border-radius:9px;border:1px solid var(--border);margin-bottom:6px;background:#FAFCF8}
.audit-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.audit-who{font-size:12px;font-weight:600;color:var(--kg)}
.audit-when{font-size:10px;color:var(--muted)}

</style>
</head>

<script>
const PCC_DATA=[{"driver":1,"name":"Create Organizational Structures that Promote Engagement","criteria":[{"id":"1.1","name":"Person-Centered Care Steering Team","recommendations":["Establish a PCC steering team and driver groups","Ensure diverse roles are represented (clinical, non-clinical, non-supervisory, managerial)","Include 1-2 patients/ family members","Include a senior-level executive champion","Include a senior-level clinical champion (nursing or medical staff)","Establish a monthly meeting schedule and track attendance","Broadly communicate the work of this group","Planetree Measurable Elements"],"changes":["1.1.3. Dropped 'representatives from different groups participated in 100% of 3 most recent meetings\u2019 -> New ME talks about 'active participants'.","1.1.4. and 1.1.5. Dropped 'senior level executive/clinical champion participation in 8 out of last 12 meetings' - ME now talks about active participation on the team, attending meetings, supporting implementation, reviewing progress.","1.1.6. New ME. 'Work of the PCC ST is made visible across the organization, including to the governing body.'","Planetree Measurable Elements"],"documents":[{"text":"*PCC Steering Team Charter or Terms of Reference","critical":true},{"text":"PCC Steering Team meeting minutes from past 12 months","critical":false},{"text":"*PCC Steering Team membership roster (names/roles)","critical":true},{"text":"PCC Steering Team meeting attendance records from past 12 months","critical":false},{"text":"PCC Steering Team Progress Report/Annual Report/Board Update from past 12 months","critical":false}],"mes":[{"id":"1.1.1","description":"The purpose of this team, how it will function, and its goals are documented and shared with all members of the team.","type":"Bronze","prevalence":"Org Wide","improvements":"Completed","self_rating":"Fully Met"},{"id":"1.1.2","description":"The team has established a consistent meeting schedule for at least one year that is sufficient to meet its purpose and goals.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.1.3","description":"Team members represent diverse functional roles and viewpoints. Active participants on the team include patients/residents/family, non-supervisory staff, management staff, clinical staff, and non-clinical staff.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.1.4","description":"At least one senior-level executive champion actively participates on the team, including attending meetings, supporting implementation and reviewing progress.","type":"Gold","prevalence":"","improvements":"","self_rating":"Partially Met"},{"id":"1.1.5","description":"At least one senior-level clinical champion actively participates on the team, including attending meetings, supporting implementation and reviewing progress.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.1.6","description":"The work of this group is made visible across the organization, including to the governing body.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"1.2","name":"Person-Centered Care Staffing","recommendations":["Assign a PCC lead and adjust their JD to reflect PCC responsibilities","Support PCC lead \u2013 technology support, direct reports, professional development","Ensure PCC lead is or reports to a senior executive","Planetree Measurable Elements"],"changes":["1.2.2. New ME. 'Individual/team appointed to advance PCC goals is supported with resources necessary to be effective in the role.\u2019","Without access to tools, resources it is unrealistic to expect the desired results.","The person/team needs dedicated resources: technology support, direct reports, professional development opportunities.","Planetree Measurable Elements"],"documents":[{"text":"*Organizational chart","critical":true},{"text":"Job description and qualifications for staff member(s) designated to guide PCC implementation activities","critical":false}],"mes":[{"id":"1.2.1","description":"A job/role description formalizes expectations and duties for the person and/or team who guides person-centered care implementation.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.2.2","description":"The individual (or team) appointed to advance person-centered care goals is supported with the resources necessary to be effective in this role.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.2.3","description":"The individual (or team) appointed to advance person-centered care is positioned appropriately within the organization to advance person-centered care goals. This includes functioning as or reporting directly to a senior executive in the organization.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"1.3","name":"Co-Design Structures & Processes","recommendations":["Establish a PFAC or PFPC \u2013 Patient and Family Advisory/Partnership Council","Ratio of patients/family to staff 2:1","Ensure patients/family members represent patient population and are not employees","Establish a monthly meeting schedule and track attendance","Evaluate effectiveness and impact annually - annual partnership survey; one-on-one check-in calls;  listening session with leadership; focus group with partners guided by an external facilitator","Co-develop and implement improvement projects (clinical, non-clinical)","Planetree Measurable Elements"],"changes":["1.3.2. New ME. \u2018Consistent meeting schedule for at least one year.\u2019","1.3.3. New ME. 'Co-design partners\u2026 assess effectiveness and impact of the partnership at least annually.\u2019","1.3.4. New ME. 'Composition of PFAC team reflects population served. Specific strategies implemented/planned to address gaps.\u2019","Planetree Measurable Elements"],"documents":[{"text":"*Patient/Resident/Family Partner Role Description, Co-Design Team Charter(s), Co-Design Standards or Work Team Charters that address co-design","critical":true},{"text":"*Patient/Resident/Family Partner Roster (names/roles)","critical":true},{"text":"Patient/Family Partner self-assessment tool, report on listening session with leadership, annual recap/reflection meeting, summary of focus group with patient/family partners.","critical":false},{"text":"*Co-design Progress Report/Annual Report/Leadership Update from past 12 months","critical":true}],"mes":[{"id":"1.3.1","description":"A co-design structure or process engages patients/residents/family and others from relevant communities of interest in ongoing person-centered improvements. The purpose, role and desired outcomes for these teams have been formalized. This may include at least one of the following: role descriptions, group charters, terms of reference, co-design standards built into quality improvement plans, or other comparable documentation.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.3.2","description":"The co-design team(s) has established a consistent meeting schedule for at least one year that is sufficient to meet its purpose and goals.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.3.3","description":"Co-design partners, including patients/residents and family, assess the effectiveness and impact of the partnership at a minimum annually.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.3.4","description":"The composition of the co-design team(s) reflects the population served. Specific strategies are being implemented (or planned) to address identified gaps.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.3.5","description":"Improvements to clinical and non-clinical aspects of the care experience have been co-designed within the past 3 years.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"1.4","name":"Person-Centered Human Resources Systems","recommendations":["Include PCC competencies into all JDs","Ensure accountability for PCC behaviors","Add PCC questions to interviews","Educate all onboarding staff on PCC","Ensure PFAC is involved in design/implementation of hiring/onboarding processes","Recruit from communities served","Workplace equity \u2013 add questions to staff engagement survey and address top issues","Planetree Measurable Elements"],"changes":["1.4.1. Includes senior leaders among those held accountable for PCC related competencies - JDs, performance management systems.","1.4.3. New ME. 'Effective system in place for holding all members of the organization accountable to organizational performance standards related to PCC.\u2019","1.4.5. New ME. Onboarding process for external workforce includes PCC.","1.4.6. Opportunities for patients/families to participate in hiring and/or onboarding processes.","1.4.7. New ME. 'Recruitment practices designed to attract candidates who represent the community served.\u2019","1.4.8. New ME. Organization has assessed workplace equity in the past 3 years. Based on findings, actions have been taken to address disparities.'","Planetree Measurable Elements"],"documents":[{"text":"Clinical and non-clinical job description","critical":false},{"text":"*Code of conduct, behavioral standards, or employee handbook","critical":true},{"text":"Written procedures for performance management","critical":false},{"text":"Written procedures for addressing behaviors in conflict with behavioral standards or code of conduct","critical":false},{"text":"*New employee orientation agenda, curriculum, learning objectives, slide decks, etc.","critical":true},{"text":"Documentation of onboarding process (or documents) for temporary and contingency staff","critical":false},{"text":"Sample staff recruitment materials, candidate vetting tools","critical":false},{"text":"Evidence of patient/resident or family involvement in hiring or onboarding","critical":false},{"text":"*Demographic profile of community / population served","critical":true},{"text":"*Demographic profile of workforce","critical":true},{"text":"Evidence of practices to recruit employees who are representative of the populations served","critical":false},{"text":"Workplace equity assessment completed within the past 3 years","critical":false}],"mes":[{"id":"1.4.1","description":"Person-centered care-related competencies or expectations, including caring attitudes and compassionate communication, are integrated into job descriptions and performance management systems for all staff, including senior leaders, clinical and non-clinical staff.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.2","description":"The onboarding process for new staff includes an introduction to person-centered care concepts.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.3","description":"An effective system is in place for holding all members of the organization accountable to organizational performance standards related to person-centered care.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.4","description":"The organization's recruitment and hiring processes enable it to screen for people who exhibit attitudes and behaviors associated with person-centered care.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.5","description":"The onboarding process for the external workforce, which may include contractors, non-employed physicians, temporary and contingency staff, includes interpersonal and cultural components, even if the external worker assignment is short-term.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.6","description":"There are opportunities for patient/resident and/or family participation in hiring and/or onboarding processes.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.7","description":"Recruitment practices have been designed to attract candidates who represent the communities served.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.4.8","description":"The organization has assessed workplace equity within the past 3 years. Based on the findings, actions have been taken to address disparities that may pertain to staff recruitment, engagement, advancement, compensation, retention or other conditions.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"1.5","name":"Healing Environment","recommendations":["Remove physical barriers: look at nurse stations and registration desks","Maintain patient privacy, modesty, dignity: look at - shared rooms, patient gowns, patient transportation routes","Enhance accessibility for special groups \u2013 physical and virtual environments","Design/allocate spaces with patient and family comfort in mind: overnight accommodations; family waiting/lounge areas; extra seating in exam room; play area","Design spaces for staff wellbeing \u2013 staff rest areas, gyms, spaces for socialization","Ensure ease of navigation: easy to follow signage in primary languages, supports special groups, human support, no clutter","Information sharing that is comprehensive, inclusive: medical library, information stations, printed/digital information, in room technology, website","Let nature in \u2013 daylight, access to outdoor spaces (staff and patients/families), artwork, indoor plants, water features","Ensure easy, personal, multilingual assistance on the phone, online","Involve patients/families/staff in redesign efforts","Planetree Measurable Elements"],"changes":["1.5.1. 'Within physical and virtual environment, spaces designed to promote communication and compassionate interactions. Physical barriers minimized to create welcoming environment that ensures health and safety of all.\u2019","1.5.3. Physical and virtual environments: improve accessibility for special groups.","1.5.4. 'Spaces to comfortably accommodate presence of family, including in treatment areas and (as applicable) at the bedside.\u2019","1.5.6. New ME. 'Spaces are available and accessible to staff to support their well-being.\u2019","1.5.8. 'clutter-free pathways and clear signage.\u2019","1.5.9. New ME. 'Measures have been taken to ensure individuals are able to navigate easily to their intended destinations online and through phone systems.\u2019","1.5.10. New ME. 'Co-design practices are used to engage users of the space (i.e., patients/residents, family, staff) in designing new spaces and improving upon existing ones.'","Planetree Measurable Elements"],"documents":[{"text":"Evidence of participatory approaches for engaging users of a space in the (re) design of space(s).","critical":false}],"mes":[{"id":"1.5.1","description":"Within the physical and virtual environment, spaces have been designed to promote communication and compassionate interactions. Physical barriers have been minimized wherever possible to create a welcoming environment that ensures the health and safety of all.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.2","description":"Within the physical environment, measures have been taken to preserve individuals\u2019 privacy, dignity and modesty.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.3","description":"The physical and virtual environment includes elements to improve accessibility for special groups, including individuals with physical, sensory, cognitive and/or intellectual disabilities.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.4","description":"Spaces are available to comfortably accommodate the presence of family, including in treatment areas and (as applicable) at the bedside.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.5","description":"There are elements within the built environment that support individuals\u2019 access to information.","type":"Silver","prevalence":"None / Minimal","improvements":"","self_rating":"Fully Met"},{"id":"1.5.6","description":"Spaces are available and accessible to staff to support their well-being.","type":"Silver","prevalence":"None / Minimal","improvements":"Completed","self_rating":"Fully Met"},{"id":"1.5.7","description":"Elements from nature, including natural light, have been incorporated into the built environment. Where feasible, outdoor spaces are made available.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.8","description":"Within the physical environment, measures have been taken to ensure individuals are able to navigate easily to their intended destinations. This includes maintaining clutter-free pathways and clear signage.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.9","description":"Measures have been taken to ensure individuals are able to navigate easily to their intended destinations online and through phone systems.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.5.10","description":"Co-design practices are used to engage users of the space (i.e. patients/residents, family, staff) in designing new spaces and improving upon existing ones.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"1.6","name":"Person-Centered Technology","recommendations":["Develop technology assessment/selection tools that include PCC criteria","Engage users in testing and evaluating technology: demos, user piloting, focus groups, user feedback","Train users of a new technology on how to use in a humanized way","Develop policy/procedure to ensure equitable access to digital tools: online support; digital access/literacy questions on SDOH assessment; wifi; offer other options (e.g. call center)","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"Technology assessment/selection tools that include person-centered criteria","critical":false},{"text":"Evidence of participatory approaches for engaging users in testing and evaluating technology","critical":false},{"text":"Training agendas or sample training modules that illustrate how new users of technology are prepared to use the tool(s) in a humanized way","critical":false},{"text":"Policies/procedures to ensure equitable access to digital aspects of the care experience","critical":false}],"mes":[{"id":"1.6.1","description":"When identifying technology needs and selecting digital tools, the impact on person-centered care and maintaining human connection is considered in the decision-making process.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.6.2","description":"As appropriate, training for users on new digital tools (including, but not limited to, telehealth or telemedicine platforms) includes techniques for using the technology in ways that convey caring and facilitates patient/resident and family engagement.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.6.3","description":"Users of technology (i.e. patients/residents, family, staff) are engaged in testing and evaluating digital tools and systems.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"1.6.4","description":"Actions have been taken to address care disparities that may result from inadequate hardware, lack of connectivity and limited digital literacy.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]}]},{"driver":2,"name":"Connect Values, Strategy and Action","criteria":[{"id":"2.1","name":"Person-Centered Care Strategic Goals & Key Performance Indicators (KPIs)","recommendations":["Include PCC goals and KPIs in organizational strategic/operational plan","Develop a KPI dashboard","PCC ST is involved in developing PCC goals \u2013 maintain meeting minutes or other evidence","Governing body (highest authority) reviews PCC KPIs at least annually","PCC policies/practices reviewed at least every 3 years by multidisciplinary body","Planetree Measurable Elements"],"changes":["2.1.1. Person-centered care goals and key performance indicators have been integrated into the organization\u2019s strategic and/or operational plan.","2.1.3. New ME. 'The governing board reviews the PCC key performance indicators (KPIs) at a minimum annually.\u2019","2.1.4. New ME. 'Key person-centered care policies/practices and documents are reviewed and updated, as needed, at a minimum every 3 years\u2026\u2019","Planetree Measurable Elements"],"documents":[{"text":"*Strategic and/or operational plan","critical":true},{"text":"*PCC Dashboard of KPIs","critical":true},{"text":"Documentation of strategic planning process","critical":false},{"text":"PCC Policy Review Process and Evidence of Review of Key PCC Policies","critical":false}],"mes":[{"id":"2.1.1","description":"Person-centered care goals and key performance indicators have been integrated into the organization\u2019s strategic and/or operational plan.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.1.2","description":"The multi-disciplinary, site-based committee structure identified in criterion 1.1. is involved in establishing the organization's person-centered care goals.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.1.3","description":"The governing board reviews the PCC key performance indicators (KPIs) at a minimum annually.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.1.4","description":"Key person-centered care policies/practices and documents are reviewed and updated, as needed, at a minimum every 3 years to ensure they are appropriate to current conditions. This review/audit process includes staff, patients/residents and families.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"2.2","name":"Leadership Engagement","recommendations":["Senior leadership takes every opportunity to talk about PCC \u2013 website, social media, message in handbooks, mission and values statements","Conduct leadership rounds, walkabouts, open office hours, lunch with leaders, town halls, job shadowing, management overnight","Leadership meets with PFAC to talk about the effectiveness of the council, opportunities for improvement \u2013 at least annually","Change ideas are acted upon","Planetree Measurable Elements"],"changes":["2.2.1. New ME. Senior leadership continuously communicate commitment to PCC and demonstrate how PCC values guide decision making, planning.","2.2.3. New ME. At least 1 senior executive meets with patient and family partners to reflect on state of partnership and identify improvement opportunities - annually.","2.2.4. Change ideas acted upon within past 3 years. Previously 18 months.","Planetree Measurable Elements"],"documents":[{"text":"Mission and/or values statements","critical":false},{"text":"Public communication of commitment to PCC (for instance, on web sites, public signage, message from leadership in patient & staff handbooks, etc.)","critical":false},{"text":"Summary of staff survey data on questions related to leadership","critical":false},{"text":"Evidence of leadership team practices that support regular interaction with staff from all sectors of the organization","critical":false},{"text":"Summary of key take-aways from meeting with patient/family partners and senior leader(s) from the past 12 months","critical":false},{"text":"Summary of improvements initiated as a result of these leadership practices","critical":false}],"mes":[{"id":"2.2.1","description":"Senior leadership continuously communicates the organization's commitment to person-centered care and demonstrates how PCC values and principles guide decision-making and planning.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.2.2","description":"Senior leaders routinely interact with staff from all sectors of the organization to 1.) communicate organizational priorities and operational plans; 2.) hear directly from staff and community members and 3.) drive improvement in the organization.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.2.3","description":"At least one senior-level executive champion within the organization meets with patient/resident/family partners who participate in co-design projects to reflect on the state of partnership and identify improvement opportunities. This occurs at a minimum annually.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.2.4","description":"Specific change ideas have been acted upon within the past 3 years based on improvement needs and opportunities identified through these leadership practices.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"2.3","name":"Person-Centered Care Education","recommendations":["Develop PCC education content, set schedule, make compulsory for all & track participation","Include experiential learning \u2013 interactive workshops, retreats, simulations, scenario-based role plays, discussion groups, reflective exercises","Evaluate content, impact, feedback","Conduct audits every 3 years and make changes accordingly","Develop and run follow up trainings every 1-2 years","Planetree Measurable Elements"],"changes":["2.3.1. Staff education calendar or plan includes PCC education.","2.3.2. Systems in place to track participation\u2026all staff receives education and training on PCC concepts, skills. Previously talked about 85% participation rates.","New ME. Curriculum audits and potential updates every 3 years \u2013 sustainability measure.","Planetree Measurable Elements"],"documents":[{"text":"*Education calendar with indication of all mandatory education sessions","critical":true},{"text":"Documentation of any competency-based PCC education currently being offered, including title, learning objectives and format (in-person, hybrid, virtual, self-directed, etc.)","critical":false}],"mes":[{"id":"2.3.1","description":"The staff education calendar or plan includes PCC education designed to help staff personally connect to the concepts of PCC and build the skills necessary to implement it, including caring communication skills. Learning objectives for these educational offerings are documented and content is developed toward those aims.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.3.2","description":"Systems are in place to track participation in PCC educational offerings toward a goal that all members of the organization receive education and training on PCC concepts and skills.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.3.3","description":"Systems are in place to evaluate PCC educational offerings.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.3.4","description":"Curriculum audits for PCC education are completed, at a minimum, every 3 years. As needed, the curriculum is updated based on evaluation data and to align with the most current evidence.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"2.4","name":"Healthy Communities","recommendations":["Conduct a community needs assessment and understand factors contributing to health inequities.","Build community partnerships with organizations that address the needs identified in the community needs assessment.","Share information on available community resources with staff, patients, families, community","Evaluate partnership effectiveness, outcomes, satisfaction","Planetree Measurable Elements"],"changes":["2.4.1. \u2018understand underlying factors contributing to health inequities.\u2019","2.4.2. Partnerships with community-based organizations address identified social needs. Previously talked about min of 3 partnerships active within last 12 months.","2.4.3. New ME. Information on supports and services offered through these partnerships, and how to access them, is made available.","2.4.4. New ME. Evaluation processes are in place to verify sustained and effective community partnerships.","Planetree Measurable Elements"],"documents":[{"text":"*Community Profile/Needs Assessment Report from last 3 years","critical":true},{"text":"Evidence of partnerships with community-based organizations to address areas of need","critical":false},{"text":"Materials that publicize how to access supports and services through these partnerships","critical":false}],"mes":[{"id":"2.4.1","description":"2.4.1. The organization draws on evidence to identify needs within its local community or population served, and to understand underlying factors contributing to health inequities.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.4.2","description":"2.4.2. Partnerships with community-based organizations address social determinants known to impact health outcomes for the population served.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.4.3","description":"2.4.3. Information on supports and services offered through these partnerships, and how to access them, is made available to staff, patients/residents/families and the community-at-large.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"2.4.4","description":"2.4.4. Evaluation processes are in place to verify sustained and effective community partnerships.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"2.5","name":"Environmental Sustainability","recommendations":["Action plan for integrating sustainable practices into the healthcare environment","Examples: recycling initiatives; use of non-toxic cleaning supplies; installation of sensors on lights; rainwater collection strategies; creation of interior green spaces to improve air quality; bike racks/incentives to encourage carpooling or use of public transport; equipment and lighting choices that decrease mercury, copper, etc. content; specification of products or materials free of contaminant ingredients like formaldehyde or polyvinyl chloride.","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"Action plan for integrating sustainable practices into the healthcare environment","critical":false},{"text":"Evidence of external validation of adoption of environmentally friendly practices","critical":false}],"mes":[{"id":"2.5.1","description":"The organization has adopted environmentally friendly practices in the operation of the facility, construction and design, and/or procurement (either already in place or being planned for the next 18 months).","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]}]},{"driver":3,"name":"Implement Practices that Promote Partnership","criteria":[{"id":"3.1","name":"Communicating Opportunities for Engagement","recommendations":["New criterion","Develop informational content and proactively inform patients and families how they can participate in their care:","Make sure the materials are reviewed by the PCC team every 3 years","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"*Patient/resident handbook, admission materials or comparable documentation that notifies patients/residents/families of opportunities for them to be involved in their care","critical":true}],"mes":[{"id":"3.1.1","description":"User-friendly information on patient/resident/family engagement opportunities explains methods for participating in care activities, care planning and decision-making, including how individuals can access information about their care. This information is made available to patients/residents/families and staff.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.1.2","description":"This information has been reviewed and updated in partnership with patient/resident/family partners within the past 3 years.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.2","name":"Patient/Resident/Family Inclusion in Care Team Communication","recommendations":["Develop a policy, procedure or workflow for these interactions \u2013 examples include bedside shift report, care planning meetings","Involve concerned staff in developing the process and educating their teams","Evaluate \u2013 not only that the process is being done but also level of participation, understanding, satisfaction, outcomes (readmission rates, follow up calls)","Ensure patient goals, preferences, concerns are documented, acted upon.","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"*Approved policy, procedure, documented workflow or other comparable documentation with sufficient detail to support predictable involvement of patients/residents and care partners in clinical handoffs and care plan meetings.","critical":true},{"text":"Tools and/or systems used to capture and share patients\u2019 goals, preferences, observations and concerns","critical":false},{"text":"Evaluation data to demonstrate sustained and effective implementation","critical":false}],"mes":[{"id":"3.2.1","description":"A process (or processes) has been formalized to encourage patient/resident and care partner participation in clinical handoffs and care planning meetings.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.2.2","description":"Education on the process(es) for involving patients/residents and care partners in clinical handoffs and care planning meetings is provided for relevant staff.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.2.3","description":"Goals, preferences, concerns and/or observations communicated by the patient/resident and/or care partner during these handoffs and care planning meetings are documented and inform the care plan.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.2.4","description":"The organization evaluates the process to verify sustained and effective implementation.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.3","name":"Transitions of Care","recommendations":["Document collaborations across care settings that address at least 3 priority transition of care risks or opportunities \u2013 include stakeholders, aim, activities, data showing impact + opportunities for improvement","Examples of practices: discharge/transition summaries provided to patient; integrated technology and coordinated electronic health records","Examples of collaborations that aim to create safer and more coordinated transitions of care: \u201cwarm handoffs\u201d from pediatrics to adult primary care; coordination with pharmacy on medication reconciliation prior to discharge and follow-up call post-discharge; coordination with home care on home visits to assess for fall risks; assigning care coordinators or case managers to people with complex needs","How do you know these efforts are achieving the desired results?","Planetree Measurable Elements"],"changes":["The organization partners with patients/residents and families and works with other healthcare providers at different points\u2026","3.3.1. New ME. Processes are in place to keep patients/residents and families informed and prepared for transitions to other care settings and/or discharge.","3.3.2. Organization partners with other healthcare providers\u2026to address key points that enable safe, coordinated transitions of care. Previously requirement to have min 3 partnerships active in last 12 months.","3.3.3. New ME on evaluation","Planetree Measurable Elements"],"documents":[{"text":"Documentation of collaborations across care settings that address at least 3 priority transition of care risks or opportunities. The documentation includes a list of stakeholder organizations involved in the collaboration, the aim, the activities and the data collected and shared to evaluate impact and guide future planning.","critical":false}],"mes":[{"id":"3.3.1","description":"Processes are in place to keep patients/residents and families informed and prepared for transitions to other care settings and/or discharge.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.3.2","description":"The organization partners with other healthcare providers at different points along the care continuum to address priority factors that enable safe and coordinated transitions of care.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.3.3","description":"Evaluation processes are in place to verify sustained and effective implementation of person-centered care transition practices.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.4","name":"Real Time Access to Personal Health Information","recommendations":["Develop a policy, procedure or workflow \u2013 with details on how patients and their care partners are informed about the process, timeliness of addressing the request, support provided in understanding the content, patient/CP contribution to notes, comments and/or questions (medical record, plan of care, visit notes)","Involve staff in developing the process","Educate concerned staff on the process and let patients know they can request real time access to their PHI","Evaluate information shared with patients, staff knowledge and competency, impact on patient satisfaction, understanding of care, quality and safety improvements","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":["Process formalized to enable individuals to access PHI, incl medical record, visit notes, and/or plan of care \u2013 applicability across care settings","3.4.3. New ME. Support is available to help individuals understand the personal health information made available to them during a care encounter.","3.4.4. Process formalized for patients and Care Partners to contribute notes, comments, questions as part of the medical record and/or plan of care.","Planetree Measurable Elements"],"documents":[{"text":"*Approved policy, procedure, documented workflow or other comparable documentation with sufficient detail to support predictable sharing of real-time personal health information.","critical":true},{"text":"Approved policy, procedure, documented workflow or other comparable documentation with sufficient detail to support the predictable ability for patients/residents and their care partners to contribute notes, comments and/or questions as part of their medical record of plan of care (if not covered in above policy)","critical":false},{"text":"Evaluation data to demonstrate sustained and effective implementation","critical":false}],"mes":[{"id":"3.4.1","description":"A process (or processes) has been formalized to enable individuals to access their real time personal health information, including their medical record, visit notes, and/or plan of care.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.4.2","description":"Education on the process(es) for providing access to real time personal health information is provided for relevant staff.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.4.3","description":"Support is available to help individuals understand the personal health information made available to them during a care encounter.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.4.4","description":"A process (or processes) has been formalized to enable patients/residents and their care partners (with patient/resident consent) to contribute notes, comments and/or questions as part of their medical record and/or plan of care.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.4.5","description":"The organization evaluates the process to verify sustained and effective implementation.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.5","name":"Health Literacy, Learning Style & Language Assessment","recommendations":["Develop a policy, procedure or workflow","Select/develop tools to assess and address individual health literacy level, preferred learning style, preferred language","Examples: teach back, show me, chunks and checks, health literacy assessments, preferred language documentation, pictures and diagrams, videos (with subtitles, sign language), written information products (with braille versions), engaging care partners in education, interpreters, translation of documents","Run a periodic analysis of prevalent languages and cater to the primary languages of the populations served","Link to quality, safety, PX data","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":["3.5.1. Process formalized to assess and document ability to understand concepts, care requirements associated with managing health. Process takes into consideration preferred language, culture, health literacy level, preferred learning style.","3.5.3. Findings of assessments used to tailor education and communication based on individual needs, preferences. Previously - give 3 examples of accommodations made to address documented language, learning style, health literacy level\u2026","Planetree Measurable Elements"],"documents":[{"text":"*Approved policy, procedure, documented workflow or comparable documentation with sufficient detail to support the predictable assessment of individuals\u2019 health literacy, preferred language, barriers to learning and preferring learning style.","critical":true},{"text":"Tools and/or systems used to tailor education based on individual needs and preferences.","critical":false},{"text":"Sample patient/resident education materials.","critical":false},{"text":"Evaluation data to demonstrate sustained and effective implementation.","critical":false}],"mes":[{"id":"3.5.1","description":"A process (or processes) has been formalized to assess and document individuals' abilities to understand the concepts and care requirements associated with managing their health. This process(es) takes into consideration an individual's preferred language, culture, health literacy level and preferred learning style.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.5.2","description":"Education on the process(es) for assessing and accommodating individuals' learning and language needs is provided for relevant staff.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.5.3","description":"The findings of these assessments are used to tailor education and communication based on individual needs and preferences.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.5.4","description":"Communication and education materials are current, user-friendly and use language patients/residents/families understand. These materials are translated into the primary languages of the populations served and are available in accessible formats, based on needs.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.5.5","description":"The organization evaluates the process to verify sustained and effective implementation.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.6","name":"Social Determinants of Health Assessment","recommendations":["Develop a policy, procedure or workflow","Tools and/or systems used to document findings of social determinants of health assessment","Examples of SDOH: safe housing, transportation, and neighborhoods; racism, discrimination, and violence; education, job opportunities, and income; access to nutritious foods and physical activity opportunities; polluted air and water; language and literacy.","Link to quality, safety, PX data","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"*Approved policy, procedure, documented workflow or other comparable documentation with sufficient detail to support the predictable assessment of social determinants of health.","critical":true},{"text":"Tools and/or systems used to document findings of social determinants of health assessment","critical":false},{"text":"Evaluation data to demonstrate sustained and effective implementation","critical":false}],"mes":[{"id":"3.6.1","description":"A process (or processes) has been formalized for assessing social determinants of an individual's health.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.6.2","description":"Education on the process(es) for assessing and addressing individuals' social determinants of health is provided for relevant staff.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.6.3","description":"The findings of these assessments inform an individualized care planning process that takes into consideration a patient's/resident\u2019s social determinants of health.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.6.4","description":"The organization evaluates the process to verify sustained and effective implementation.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.7","name":"Person-Centered Family Presence","recommendations":["Ensure public-facing communication (website, patient handbook information, signage, etc.) is aligned with the visitation/family presence policy","Avoid universal restrictions \u2013 all children under 12 not allowed, etc.","Include staff (Nursing, QPS, Security, PX, others) in developing process and support them in overcoming obstacles during implementation","Develop proactive measures to maintain in-person family presence during a public health crisis (at least for care partners)","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":["Previously 3.5.","Guidelines and protocols maximize patient/resident access to family and do not prescribe a \"one size fits all\" approach to visitation. No mention of 24 hour visitation showing applicability to all settings of care.","3.7.2. The organization\u2019s family presence policy includes no universal restrictions (unless evidence-backed) that restrict essential family caregivers\u2026","3.7.4. New ME - applies principles of emergency preparedness to family presence.","Planetree Measurable Elements"],"documents":[{"text":"*Visitation/Family Presence Policy","critical":true},{"text":"Public-facing communication of the visitation/family presence policy (web site screen shot, patient handbook information, signage, etc.)","critical":false},{"text":"Tools and/or education to support the care team in managing family presence.","critical":false},{"text":"*Written and approved plan for how the organization will maintain in-person family presence during a future public health crisis.","critical":true}],"mes":[{"id":"3.7.1","description":"Members of the care team involved in managing family presence are supported in meeting individual patient/resident and family needs with flexibility, empathy and equity.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.7.2","description":"The organization\u2019s family presence policy includes no universal restrictions that restrict essential family caregivers (also referred to as care partners) from being in treatment areas or (as applicable) at the bedside based on age, relation, or time of the visit. Instead, any limits to family presence are mutually developed between the patient/resident, their support network and the care team. Limits are based on patient/resident preferences, the treatment plan and safety considerations. (In such cases where such universal restrictions may be necessary, evidence is available to support the need for universal restrictions and a formalized process is in place to maximize flexibility around the presence of family.)","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.7.3","description":"Public communication of family presence guidelines is consistent with the current policy. When documented public health measures require limitations to family presence, these restrictions are clearly communicated, along with any generalized exceptions to those restrictions and the process and criteria for making case-by-case exceptions, including contact information for institutional decision-makers to whom families and staff may appeal to for an exception.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.7.4","description":"A plan has been approved for how the organization will meet the intent of maintaining in-person family presence for, at a minimum, care partners during a public health crisis. This plan indicates how patient/family partners and staff who will be responsible for implementing and enforcing the family presence policy will be included as part of the decision-making process.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.8","name":"Family Participation in Care (Care Partners)","recommendations":["Develop a policy, procedure or workflow for identifying, documenting selected care partners","Use a tool/assessment form to determine care partner choices and abilities; patient choices","Orient care partners to their role and tailor education based on choices, abilities","Care partner program, caregiver assessment tools, educational content, tools for care partners to track changes in health status, onsite care partner center equipped with tools and supports","Link to quality, safety, PX data","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":["Previously 3.6.","Replaced terminology \u201cfamily/friend caregivers\u201d with \u201ccare partners\u201d to use consistent language.","3.8.3. New ME. The approach for engaging care partners is tailored to the treatment plan, patient/resident preference and the care partners\u2019 abilities.","Planetree Measurable Elements"],"documents":[{"text":"*Approved policy, procedure, documented workflow or other comparable documentation with sufficient detail to predictably identify, engage and care partners as members of the care team.","critical":true},{"text":"Tools and/or systems used to tailor care partners\u2019 involvement based on individual needs and preferences.","critical":false},{"text":"Evaluation data to demonstrate sustained and effective implementation.","critical":false}],"mes":[{"id":"3.8.1","description":"A process (or processes) has been formalized to facilitate the identification, orientation and participation of care partners as members of the care team with documented roles and responsibilities (based on individual preferences).","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.8.2","description":"Education on the process(es) for identifying and partnering with care partners is provided for relevant staff.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.8.3","description":"The approach for engaging care partners is tailored to the treatment plan, patient/resident preference and the care partners\u2019 abilities.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.8.4","description":"The organization evaluates the process to verify sustained and effective implementation.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"3.9","name":"Staff Engagement","recommendations":["New criterion","Develop structures/processes to facilitate unit- or department-based problem solving and involvement","Examples: unit-based councils; neighborhood meetings; practice improvement teams; rapid improvement events; staff-driven performance improvement projects; collaborative practice committees to support interprofessional collaboration; employee resource groups; root cause analyses; consistent assignment or team-based nursing approach.","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"Evidence of structures or processes that promote staff empowerment and autonomy within their functional role.","critical":false}],"mes":[{"id":"3.9.1","description":"Methods or structures are in place that enable staff members across levels and sectors of the organization to participate in identifying and implementing improvements in their functional work area.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.9.2","description":"Education is offered to staff to build competency in improvement work.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"3.9.3","description":"Specific change ideas have been acted upon based on improvement needs and opportunities identified through these methods within the past 3 years.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]}]},{"driver":4,"name":"Know What Matters","criteria":[{"id":"4.1","name":"Caring Communication","recommendations":["Develop a code of conduct, behavioral standards and/or employee handbook","Develop a policies/ written standards for exhibiting compassion, empathy, courtesy and respect when:","Disclosing adverse events","Holding billing and collections communication","Caring for individuals exhibiting aggression","Communicating with colleagues","Review patient and staff surveys and ensure questions are included to assess these behavioral standards \u2013 or conduct a Caring Culture survey","Standards need to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":["4.1.1. Behavioral expectations for compassion, courtesy and respect have been established for each of the following: - Disclosing adverse events or unanticipated outcomes to those affected, including staff \u2026","Removed reference to responding to complaints and concerns as that is covered in criterion 5.6. (Complaints and Grievances)","4.1.2. New ME. Site-specific data on compassion, courtesy and respect as reported by patients/residents and staff is collected, analyzed and addressed, at a minimum, every 3 years.","Planetree Measurable Elements"],"documents":[{"text":"*Code of conduct, Behavioral standards, Employee Handbook","critical":true},{"text":"*Policy and/or written standards for disclosing adverse events with compassion, empathy, courtesy and respect","critical":true},{"text":"Policy and/or written standards for exhibiting compassion, empathy, courtesy and respect in billing and collections communication","critical":false},{"text":"Policy and/or written standards for exhibiting compassion, empathy, courtesy and respect when caring for individuals exhibiting aggression","critical":false},{"text":"Policy and/or written standards for exhibiting compassion, empathy, courtesy and respect in communication with colleagues","critical":false},{"text":"Summary and analysis of survey data on compassion, courtesy and respect in the care experience","critical":false}],"mes":[{"id":"4.1.1","description":"Behavioral expectations for compassion, courtesy and respect have been established for each ence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"4.3","name":"Advance Care Planning","recommendations":["Develop a process and user-friendly materials/tools, run community engagement campaigns to promote documentation of wishes and preferences (e.g. Five Wishes)","Educate staff on how to proactively discuss with patients; explain; document and address preferences; capture updates","Practice needs to be in place for 6 months for fully met rating","Planetree Measurable Elements"],"changes":["New criterion - Patient/resident advance care planning preferences are documented in the medical record and/or care plan.","This may include preferences for care throughout the lifespan, including living with chronic disease, at the end of life or at times when the individual is unable to speak for themselves.","4.3.4. Process in place to monitor/track % of pts with documented AC plans (previously - end-of-life and palliative care preferences and wishes)","Planetree Measurable Elements"],"documents":[{"text":"*Approved policy, procedure, documented workflow or comparable documentation with sufficient detail to support the predictable documentation of individuals\u2019 advance care planning preferences","critical":true},{"text":"Sample user-friendly materials to support individuals in considering and documenting advance care planning preferences","critical":false},{"text":"Evaluation data to demonstrate sustained and effective implementation","critical":false}],"mes":[{"id":"4.3.1","description":"A process (or processes) has been formalized to capture advance care planning preferences.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.3.2","description":"User-friendly materials are provided to support individuals in considering and documenting advance care planning preferences.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.3.3","description":"Education on the process(es) for documenting advance care planning preferences is provided for relevant staff.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.3.4","description":"A process is in place to monitor and track the percentage of patients/residents with documented advance care plans.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"4.4","name":"Health Equity","recommendations":["Conduct diversity, equity, inclusion training to all staff","Translate experience surveys into primary languages","Stratify experience survey data by nationality, age, socioeconomic status or other relevant characteristics)","Develop a plan for addressing health disparities","Planetree Measurable Elements"],"changes":["4.4.1. New ME. Education is provided for staff and providers on concepts related to diversity, equity and inclusion (DEI).","4.4.3 Quality and experience survey data stratified by relevant characteristics","Planetree Measurable Elements"],"documents":[{"text":"A written, evidence-informed plan for addressing documented health disparities (see 2.4.1)","critical":false},{"text":"Documentation of any competency-based education offered to staff in the past 12 months on topics related to diversity, equity and inclusion including learning objectives","critical":false},{"text":"Evidence of experience surveys translated into primary languages of populations served","critical":false}],"mes":[{"id":"4.4.1","description":"Education is provided for staff and providers on concepts related to diversity, equity and inclusion (DEI). This education has occurred, at a minimum, within the past 3 years.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.4.2","description":"Experience surveys are translated into multiple languages, as appropriate, based on the cultural and linguistic needs of the population(s) served.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.4.3","description":"Quality and experience survey data is stratified by relevant characteristics, for instance race, ethnicity, age and socioeconomic status. These findings inform the plan referenced in 4.4.4.","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.4.4","description":"Based on an evidence-informed assessment of community needs and underlying factors that contribute to health disparities (see 2.4.1.), the organization has a written strategy or plan for reducing disparities within its service area or population served.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"4.5","name":"Personalizing the Care Experience","recommendations":["Develop processes and materials to notify patients of options available to them: admission packet, welcome materials, signage in patient rooms, menus, etc.","Examples of personalization: after hour appointments; prayer spaces; meal menu with flexible times; preferred sleep times; bathing preferences (days/time); complementary therapies (aromatherapy, Reiki, herbal remedies for sleeplessness, pain\u2026); control over lighting, AC; access to daylight; entertainment (technology, reading, crafts)","Planetree Measurable Elements"],"changes":[],"documents":[{"text":"Evidence for how patients/residents are notified of options available to them to personalize their care experience, for instance an admission packet, welcome materials, signage in patient rooms, menus, etc.","critical":false}],"mes":[{"id":"4.5.1","description":"Mechanisms are in place to accommodate personal preferences related to scheduling and access.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.2","description":"Mechanisms are in place to integrate individuals' spiritual beliefs and cultural norms into their care and treatment upon request.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.3","description":"Mechanisms are in place to accommodate personal preferences related to meals and mealtimes. (Applies to overnight environments only.)","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.4","description":"Mechanisms are in place to accommodate personal preferences related to sleep (e.g. routines, wake times, etc.). (Applies to overnight environments only.)","type":"Silver","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.5","description":"Mechanisms are in place to accommodate personal preferences related to bathing and personal grooming. (Applies to overnight environments only.)","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.6","description":"Mechanisms are in place to accommodate personal preferences related to use of a broad range of healing modalities, including those considered complementary to Western or traditional modalities.","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.7","description":"Mechanisms are in place to accommodate personal preferences related to the personal environment. (Applies to overnight environments only.)","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.5.8","description":"Mechanisms are in place to accommodate personal preferences related to positive diversions and/or life enrichment activities (including social support).","type":"Gold","prevalence":"","improvements":"","self_rating":"Fully Met"}]},{"id":"4.6","name":"Protecting and Promoting Workforce Well-Being","recommendations":["Establish emotional and mental health support services and track utilization","Ensure staff are aware of available support services \u2013 through employee handbook, fliers, intranet postings, etc.","Develop tools, systems and/or processes that enable meaningful feedback and gratitude \u2013 how is a culture of gratitude being built?","Develop policy and/or procedure for reporting concerns related to the workplace environment \u2013 how are staff encouraged to report? is there enough confidentiality? what actions are taken as a result?","Ensure staff provide input on priority areas for staff support services \u2013 through surveys, assessments, etc.","Build social calendars with events for all staff","Evaluate participation, satisfaction with services, events","Processes in place for 6 months for a fully met rating","Planetree Measurable Elements"],"changes":["4.6. Protecting and promoting workforce wellbeing. Mechanisms are in place to provide staff support services with an emphasis on elements that promote physical and mental health, psychological safety, and a sense of belonging and inclusion.","4.6.1. Emotional and grief support is encouraged and available to all members of the workforce.","4.6.2. Health promotion activities and supports are encouraged and available to all members of the workforce.","4.6.4., 4.6.5., 4.6.6. New MEs.","Planetree Measurable Elements"],"documents":[{"text":"Documentation of staff support services available, for instance in the employee handbook, fliers, intranet postings, etc.","critical":false},{"text":"Evidence of tools, systems and/or processes that enable meaningful feedback and gratitude.","critical":false},{"text":"*Written policy and/or procedure for reporting concerns related to the workplace environment.","critical":true},{"text":"Evidence of review/analysis of workplace violence reports from the past 12 months.","critical":false},{"text":"Surveys, assessments and/or reports on input provided by staff into priority areas for staff support services.","critical":false}],"mes":[{"id":"4.6.1","description":"Emotional and grief support is encouraged and available to all members of the workforce.","type":"Bronze","prevalence":"","improvements":"","self_rating":"Fully Met"},{"id":"4.6.2","description":"Health promotion activities and supports are encouraged and available to all members of the workforce.","type":"Bronze","prevalence":"","im   var blob = new Blob([Uint8Array.from(atob(b64),function(c){return c.charCodeAt(0);})],{type:mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ==================== CERT CALC ====================
function calcCert(ratings){
  var b={t:0,fm:0,ppf:0},s={t:0,fm:0,ppf:0},g={t:0,fm:0,ppf:0};
  PCC_DATA.forEach(function(d){d.criteria.forEach(function(c){c.mes.forEach(function(m){
    var r=ratings[m.id]||"";
    if(!m.type||r==="Not Applicable")return;
    var bkt=m.type==="Bronze"?b:m.type==="Silver"?s:g;
    bkt.t++;
    if(r==="Fully Met"){bkt.fm++;bkt.ppf++;}
    else if(r==="Partially Met")bkt.ppf++;
  });});});
  var ga=s.t>0&&s.fm===s.t&&g.t>0&&g.ppf===g.t;
  var sa=b.t>0&&b.fm===b.t&&s.t>0&&s.ppf===s.t;
  var ba=b.t>0&&b.ppf===b.t;
  return{result:ga?"Gold":sa?"Silver":ba?"Bronze":"None",b:b,s:s,g:g};
}
function driverStats(driverNum,ratings){
  var d=PCC_DATA.find(function(x){return x.driver===driverNum;});
  if(!d)return{total:0,fm:0,pm:0,nm:0,nr:0};
  var total=0,fm=0,pm=0,nm=0,nr=0;
  d.criteria.forEach(function(c){c.mes.forEach(function(m){
    total++;var r=ratings[m.id]||"";
    if(r==="Fully Met")fm++;else if(r==="Partially Met")pm++;else if(r==="Not Met")nm++;else nr++;
  });});
  return{total:total,fm:fm,pm:pm,nm:nm,nr:nr,pct:total?Math.round(fm/total*100):0};
}

function makeCell(v, opts){
  var cell = {v: v===null||v===undefined ? "" : v, t: "s"};
  var s = {};
  if(opts.bold||opts.color||opts.size||opts.italic||opts.name){
    s.font = {};
    if(opts.bold)   s.font.bold   = true;
    if(opts.italic) s.font.italic = true;
    if(opts.color)  s.font.color  = {rgb: opts.color};
    if(opts.size)   s.font.sz     = opts.size;
    if(opts.name)   s.font.name   = opts.name||"Calibri";
  }
  if(opts.bg){
    s.fill = {patternType:"solid", fgColor:{rgb: opts.bg}};
  }
  if(opts.align||opts.valign||opts.wrap){
    s.alignment = {};
    if(opts.align)  s.alignment.horizontal = opts.align;
    if(opts.valign) s.alignment.vertical   = opts.valign||"top";
    if(opts.wrap!==false) s.alignment.wrapText = true;
  }
  s.border = {
    top:    {style:"thin", color:{rgb:"BFBFBF"}},
    bottom: {style:"thin", color:{rgb:"BFBFBF"}},
    left:   {style:"thin", color:{rgb:"BFBFBF"}},
    right:  {style:"thin", color:{rgb:"BFBFBF"}}
  };
  if(opts.borderMed){
    var m = {style:"medium", color:{rgb:"999999"}};
    s.border = {top:m, bottom:m, left:m, right:m};
  }
  if(Object.keys(s).length) cell.s = s;
  return cell;
}
